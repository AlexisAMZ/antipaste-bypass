<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title data-i18n="extensionName">Anti-Paste Bypass</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="header-brand">
        <img src="../icons/icon-48.png" alt="Logo" class="brand-logo">
        <div class="brand-text">
          <h1 class="brand-title" data-i18n="extensionName">Anti-Paste Bypass</h1>
          <p class="brand-subtitle" data-i18n="popupSubtitle">Contournement intelligent</p>
        </div>
      </div>
      
      <div class="header-actions">
        <select id="lang-selector" class="lang-select">
          <option value="en">🇬🇧 EN</option>
          <option value="fr">🇫🇷 FR</option>
          <option value="es">🇪🇸 ES</option>
          <option value="pt">🇵🇹 PT</option>
          <option value="it">🇮🇹 IT</option>
          <option value="de">🇩🇪 DE</option>
        </select>
      </div>
    </header>

    <!-- Main Content -->
    <main class="app-main">
      
      <!-- Paste Area Section -->
      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title" data-i18n="textLabel">Texte à coller</h2>
          <span id="status-message" class="status-indicator hidden">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
            Sauvegardé
          </span>
        </div>
        <div class="panel-body">
          <textarea id="saved-text" class="paste-textarea" rows="4" data-i18n-placeholder="textPlaceholder" placeholder="Collez votre texte ici en premier..."></textarea>
        </div>
      </section>

      <!-- Settings Section -->
      <section class="panel">
        <div class="panel-body settings-grid">
          
          <!-- Speed Setting -->
          <div class="setting-row">
            <label for="speed-select" class="setting-label" data-i18n="speedLabel">Vitesse de frappe</label>
            <select id="speed-select" class="custom-select">
              <option value="50" data-i18n="speedSlow">Lente (50ms)</option>
              <option value="15" selected data-i18n="speedNormal">Normale (15ms)</option>
              <option value="5" data-i18n="speedFast">Rapide (5ms)</option>
              <option value="0" data-i18n="speedInstant">Instantanée (0ms)</option>
            </select>
          </div>

          <div class="divider"></div>

          <!-- Anti-AI Toggle -->
          <label class="setting-row toggle-row" for="anti-ai-toggle">
            <div class="setting-info">
              <span class="setting-label danger-text" data-i18n="antiAILabel">Mode Ultra-Humain (Fautes & Corrections)</span>
            </div>
            <div class="toggle-switch danger-toggle">
              <input type="checkbox" id="anti-ai-toggle" class="toggle-input">
              <span class="toggle-slider"></span>
            </div>
          </label>

          <div class="divider"></div>

          <!-- Incognito Toggle -->
          <label class="setting-row toggle-row" for="incognito-toggle">
            <div class="setting-info">
              <span class="setting-label stealth-text" data-i18n="incognitoLabel">Mode Incognito (Ne pas sauvegarder l'historique)</span>
            </div>
            <div class="toggle-switch stealth-toggle">
              <input type="checkbox" id="incognito-toggle" class="toggle-input">
              <span class="toggle-slider"></span>
            </div>
          </label>

        </div>
      </section>
      
      <!-- History Section -->
      <section class="panel history-panel">
        <div class="panel-header">
          <h2 class="panel-title" data-i18n="historyTitle">Historique Récent</h2>
          <button id="clear-history" class="btn-clear" data-i18n="clearHistory">Effacer</button>
        </div>
        <div class="panel-body p-0">
          <div id="history-list" class="history-list">
            <div class="history-empty" data-i18n="historyEmpty">Aucun historique</div>
          </div>
        </div>
      </section>

    </main>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
