<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title data-i18n="extensionName">Anti-Paste Bypass</title>
  <link rel="stylesheet" href="../css/bootstrap.min.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body class="bg-light">
  <div class="container p-3" style="width: 360px;">
    
    <!-- Header -->
    <header class="d-flex align-items-center mb-4">
      <img src="../icons/icon-48.png" alt="Logo" class="me-3 rounded shadow-sm" width="40" height="40">
      <div>
        <h5 class="mb-0 fw-bold text-primary" data-i18n="extensionName">Anti-Paste Bypass</h5>
        <small class="text-muted" data-i18n="popupSubtitle">Contournement intelligent</small>
      </div>
    </header>

    <!-- Main Content -->
    <main>
      <!-- Text Area Card -->
      <div class="card shadow-sm border-0 mb-3">
        <div class="card-body p-3">
          <label for="saved-text" class="form-label fw-bold" data-i18n="textLabel">Texte à coller</label>
          <textarea id="saved-text" class="form-control" rows="4" data-i18n-placeholder="textPlaceholder" placeholder="Collez votre texte ici en premier..."></textarea>
          <div class="d-flex justify-content-between align-items-center mt-2">
            <small id="status-message" class="text-success fw-bold opacity-0 transition-opacity">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-1"><path d="M20 6 9 17l-5-5"/></svg>
              Sauvegardé
            </small>
          </div>
        </div>
      </div>

      <!-- Settings Card -->
      <div class="card shadow-sm border-0 mb-3">
        <div class="card-body p-3">
          <!-- Speed -->
          <div class="mb-3">
            <label for="speed-select" class="form-label fw-bold d-flex justify-content-between">
              <span data-i18n="speedLabel">Vitesse de frappe</span>
            </label>
            <select id="speed-select" class="form-select form-select-sm">
              <option value="50" data-i18n="speedSlow">Lente (50ms)</option>
              <option value="15" selected data-i18n="speedNormal">Normale (15ms)</option>
              <option value="5" data-i18n="speedFast">Rapide (5ms)</option>
              <option value="0" data-i18n="speedInstant">Instantanée (0ms)</option>
            </select>
          </div>
          <!-- Anti-AI Toggle -->
          <div class="form-check form-switch mb-0 d-flex align-items-center">
            <input class="form-check-input mt-0 me-2" type="checkbox" role="switch" id="anti-ai-toggle">
            <label class="form-check-label small fw-semibold text-danger" for="anti-ai-toggle" data-i18n="antiAILabel" style="cursor: pointer;">Mode Ultra-Humain (Fautes & Corrections)</label>
          </div>
        </div>
      </div>
      
      <!-- History Card -->
      <div class="card shadow-sm border-0 mb-3">
        <div class="card-body p-3">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <label class="form-label fw-bold mb-0" data-i18n="historyTitle">Historique Récent</label>
            <button id="clear-history" class="btn btn-outline-danger btn-sm py-0" data-i18n="clearHistory">Effacer</button>
          </div>
          <div id="history-list" class="list-group list-group-flush rounded border">
            <div class="list-group-item text-muted text-center py-2" data-i18n="historyEmpty">Aucun historique</div>
          </div>
        </div>
      </div>
    </main>

  </div>
  <script src="popup.js"></script>
</body>
</html>
