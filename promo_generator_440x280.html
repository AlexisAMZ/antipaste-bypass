<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 440px;
      height: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top right, #1f2937, #111827);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    
    .tech-grid {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 20px 20px;
      z-index: 1;
    }

    .content {
      z-index: 10;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .icon-container {
      width: 96px;
      height: 96px;
      background: white;
      border-radius: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 0 0 4px rgba(255,255,255,0.1);
    }

    .icon-container img {
      width: 64px;
      height: 64px;
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      margin: 0;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    p {
      font-size: 14px;
      font-weight: 500;
      color: #9ca3af;
      margin: 0;
      letter-spacing: 0.5px;
    }

    .badge-container {
      display: flex;
      gap: 10px;
      margin-top: 5px;
    }

    .badge {
      background: rgba(255,255,255,0.1);
      padding: 6px 12px;
      border-radius: 50px;
      font-size: 10px;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(5px);
    }

    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(167, 139, 250, 0.2) 0%, transparent 70%);
      z-index: 0;
    }
  </style>
</head>
<body>
  <div class="tech-grid"></div>
  <div class="glow"></div>
  
  <div class="content">
    <div class="icon-container">
      <img src="icons/icon-128.png" alt="Logo">
    </div>
    
    <div>
      <h1>Anti-Paste Bypass</h1>
      <p>Contournement intelligent du presse-papiers.</p>
    </div>

    <div class="badge-container">
      <div class="badge">🚀 Rapide</div>
      <div class="badge">🤖 Anti-IA</div>
    </div>
  </div>
</body>
</html>
