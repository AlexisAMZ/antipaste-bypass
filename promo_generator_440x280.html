<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Promo 440x280 Generator</title>
  <style>
    body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; padding: 20px; font-family: sans-serif; }
    button { padding: 10px 20px; background: #6366f1; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; margin-bottom: 14px; }
    button:hover { background: #818cf8; }
    #info { color: #888; font-size: 12px; margin-bottom: 8px; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,300;9..144,1,300;9..144,0,400;9..144,1,400&family=JetBrains+Mono:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="info">Format Tuile 440×280 (Très lisible)</div>
  <button onclick="download()">⬇️ Télécharger PNG 440×280</button>
  <canvas id="canvas" width="440" height="280" style="border:1px solid #333;"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const W = 440, H = 280;

    async function draw() {
      await document.fonts.ready;

      // 1. Background profond
      ctx.fillStyle = '#06060a';
      ctx.fillRect(0, 0, W, H);

      // 2. Grille subtile en fond
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
      for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

      // 3. Énorme Halo violet central/droite pour attirer l'œil
      const mainGlow = ctx.createRadialGradient(W/2, H/2 + 20, 0, W/2, H/2 + 20, 240);
      mainGlow.addColorStop(0, 'rgba(99,102,241,0.4)');
      mainGlow.addColorStop(0.5, 'rgba(99,102,241,0.1)');
      mainGlow.addColorStop(1, 'transparent');
      ctx.fillStyle = mainGlow;
      ctx.fillRect(0, 0, W, H);

      // 4. Logo géant transparent au centre
      ctx.font = '140px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.globalAlpha = 0.08;
      ctx.fillText('⌨️', W/2, H/2 + 10);
      ctx.globalAlpha = 1.0;

      // 5. Eyebrow "CHROME EXTENSION"
      ctx.fillStyle = 'rgba(129,140,248,0.9)';
      ctx.font = '600 10px "JetBrains Mono"';
      ctx.letterSpacing = '3px';
      ctx.textAlign = 'center';
      ctx.fillText('CHROME EXTENSION', W/2, 60);
      ctx.letterSpacing = '0px';

      // 6. Titre Géant au centre (Fraunces)
      ctx.fillStyle = '#f5f5f7';
      ctx.font = '300 52px "Fraunces"';
      ctx.fillText('Anti-Paste', W/2, 120);

      // 7. Mot "Bypass" en Italique Violet éclatant
      const grad = ctx.createLinearGradient(W/2 - 80, 0, W/2 + 80, 0);
      grad.addColorStop(0, '#818cf8');
      grad.addColorStop(1, '#6366f1');
      ctx.fillStyle = grad;
      ctx.font = 'italic 300 56px "Fraunces"';
      ctx.fillText('Bypass', W/2, 175);

      // 8. Tagline minimaliste avec icône clavier
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = '400 16px "Inter"';
      ctx.fillText('Paste anywhere.', W/2, 230);

      // 9. Bordure lumineuse subtile en bas
      const borderGrad = ctx.createLinearGradient(0, 0, W, 0);
      borderGrad.addColorStop(0, 'transparent');
      borderGrad.addColorStop(0.5, '#6366f1');
      borderGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = borderGrad;
      ctx.fillRect(W/2 - 100, H - 2, 200, 2);
    }

    function download() {
      const link = document.createElement('a');
      link.download = 'promo_440x280.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    draw();
  </script>
</body>
</html>
